<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sound Credit Union Sentiment Kiosk</title>

  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js"
      }
    }
  </script>

  <style>
    :root {
      --navy: #003366;
      --gold: #FFB800;
      --bg: #ffffff;
      --text: #1f2937;
      --muted: #555;
      --error: #c2410c;
      --success-bg: #e9fff3;
      --success-text: #075e2d;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      text-align: center;
      touch-action: manipulation;
    }

    body {
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .kiosk {
      width: min(1360px, 100%);
    }

    .logo {
      width: min(640px, 82vw);
      height: auto;
      margin: 0 auto 12px;
      display: block;
    }

    h1 {
      margin: 8px 0 10px;
      color: var(--navy);
      font-size: clamp(3rem, 7vw, 6rem);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .divider {
      width: min(280px, 40vw);
      height: 4px;
      background: #9fd4f2;
      margin: 22px auto 28px;
      border-radius: 999px;
    }

    h2 {
      margin: 0;
      color: var(--navy);
      font-size: clamp(2rem, 4.5vw, 4rem);
      line-height: 1.05;
    }

    .sub {
      color: var(--muted);
      font-size: clamp(1.35rem, 2.8vw, 2.35rem);
      margin: 14px 0 34px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(5, minmax(150px, 1fr));
      gap: clamp(14px, 2vw, 28px);
      width: 100%;
      margin: 0 auto;
    }

    .btn {
      appearance: none;
      border: 4px solid var(--navy);
      background: #fff;
      border-radius: 28px;
      min-height: clamp(210px, 28vh, 300px);
      padding: 22px 14px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(0, 51, 102, 0.12);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
    }

    .btn:active {
      transform: scale(0.96);
      background: #fff9e6;
      box-shadow: 0 6px 14px rgba(0, 51, 102, 0.18);
    }

    .emoji {
      font-size: clamp(80px, 9vw, 128px);
      line-height: 1;
      margin-bottom: 18px;
    }

    .label {
      display: block;
      color: var(--navy);
      font-size: clamp(1rem, 1.8vw, 1.55rem);
      font-weight: 800;
      line-height: 1.1;
    }

    .score {
      margin-top: 18px;
      color: var(--navy);
      font-size: clamp(2rem, 4vw, 3.5rem);
      font-weight: 800;
      line-height: 1;
    }

    .branch {
      margin-top: 36px;
      color: var(--muted);
      font-size: clamp(1.25rem, 2.5vw, 2rem);
    }

    .branch strong {
      color: #0066cc;
    }

    .toast {
      position: fixed;
      top: max(28px, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%) translateY(-150%);
      background: var(--success-bg);
      color: var(--success-text);
      border: 2px solid rgba(7, 94, 45, 0.16);
      border-radius: 999px;
      padding: 16px 32px;
      font-size: clamp(1.3rem, 2.4vw, 2rem);
      font-weight: 800;
      box-shadow: 0 16px 32px rgba(0,0,0,.18);
      opacity: 0;
      pointer-events: none;
      transition: transform 220ms ease, opacity 220ms ease;
      z-index: 10;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .error-indicator {
      position: fixed;
      right: 20px;
      bottom: 18px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: transparent;
      opacity: 0;
      box-shadow: 0 0 0 4px rgba(194,65,12,.16);
      transition: opacity 180ms ease;
    }

    .error-indicator.show {
      background: var(--error);
      opacity: 1;
    }

    @media (orientation: portrait) {
      .buttons {
        grid-template-columns: repeat(2, minmax(150px, 1fr));
      }
      .btn:last-child {
        grid-column: 1 / -1;
        width: min(420px, 100%);
        margin: 0 auto;
      }
    }

    @media (max-width: 760px) {
      body {
        align-items: flex-start;
      }
      .buttons {
        grid-template-columns: 1fr;
      }
      .btn {
        min-height: 130px;
        flex-direction: row;
        justify-content: flex-start;
        gap: 20px;
        padding: 18px 24px;
      }
      .emoji {
        margin-bottom: 0;
        font-size: 80px;
      }
      .label, .score {
        margin: 0;
        text-align: left;
      }
    }
  </style>
</head>

    <h2>Member Sentiment</h2>
    <div class="divider" aria-hidden="true"></div>

    <h2>How was your visit today?</h2>
    <div class="sub">Tap a face to share your experience</div>

    <section class="buttons" id="ratings" aria-label="Satisfaction rating choices"></section>

    <div class="branch">Branch: <strong id="branchName"></strong></div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite">Thank you!</div>
  <div class="error-indicator" id="errorIndicator" title="Last response could not be saved"></div>

  <script type="module">
    import { initializeApp } from "firebase/app";
    import { getFirestore, collection, addDoc } from "firebase/firestore";

    /**********************************************************************
     * BRANCH CONFIGURATION
     * Update this value for each kiosk/tablet location before deploying.
     **********************************************************************/
    const BRANCH_NAME = "Downtown Olympia Branch";

    /**********************************************************************
     * FIREBASE CONFIGURATION
     * Replace these placeholder values with your Firebase project settings.
     **********************************************************************/
const firebaseConfig = {
  apiKey: "AIzaSyAUghPU7YeofvbIQtiISTTvsyB-ZgXlV8g",
  authDomain: "sound-member-sentiment.firebaseapp.com",
  projectId: "sound-member-sentiment",
  storageBucket: "sound-member-sentiment.firebasestorage.app",
  messagingSenderId: "247937803523",
  appId: "1:247937803523:web:a540ebfd6ded4771f7b536",
  measurementId: "G-W8S1ZGXY7V"
};

    const RATINGS = [
      { rating: 1, emoji: "😡", label: "Very Unsatisfied" },
      { rating: 2, emoji: "😕", label: "Unsatisfied" },
      { rating: 3, emoji: "😐", label: "Neutral" },
      { rating: 4, emoji: "🙂", label: "Satisfied" },
      { rating: 5, emoji: "😄", label: "Very Satisfied" }
    ];

    const ratingsEl = document.getElementById("ratings");
    const toastEl = document.getElementById("toast");
    const errorIndicatorEl = document.getElementById("errorIndicator");
    const branchNameEl = document.getElementById("branchName");

    branchNameEl.textContent = BRANCH_NAME;

    window.addEventListener("contextmenu", (event) => event.preventDefault());

    let db = null;
    let toastTimer = null;
    let errorTimer = null;

    try {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
    } catch (error) {
      console.error("Firebase initialization failed:", error);
      showSubtleError();
    }

    function renderButtons() {
      ratingsEl.innerHTML = "";

      RATINGS.forEach((item) => {
        const button = document.createElement("button");
        button.className = "btn";
        button.type = "button";
        button.setAttribute("aria-label", `${item.label}, rating ${item.rating} of 5`);

        button.innerHTML = `
          <span class="emoji" aria-hidden="true">${item.emoji}</span>
          <span class="label">${item.label}</span>
          <span class="score" aria-hidden="true">${item.rating}</span>
        `;

        button.addEventListener("click", () => handleRatingTap(item));
        ratingsEl.appendChild(button);
      });
    }

    function handleRatingTap(item) {
      showThankYou();

      const response = {
        rating: item.rating,
        emoji: item.emoji,
        label: item.label,
        timestamp: new Date().toISOString(),
        branch: BRANCH_NAME
      };

      saveResponse(response);
    }

    function showThankYou() {
      clearTimeout(toastTimer);
      toastEl.classList.add("show");

      toastTimer = window.setTimeout(() => {
        toastEl.classList.remove("show");
      }, 3000);
    }

    async function saveResponse(response) {
      if (!db) {
        showSubtleError();
        return;
      }

      try {
        await addDoc(collection(db, "sentiment_responses"), response);
      } catch (error) {
        console.error("Firestore write failed:", error);
        showSubtleError();
      }
    }

    function showSubtleError() {
      clearTimeout(errorTimer);
      errorIndicatorEl.classList.add("show");

      errorTimer = window.setTimeout(() => {
        errorIndicatorEl.classList.remove("show");
      }, 6000);
    }

    renderButtons();
  </script>
